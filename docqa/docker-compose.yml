services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docqa-db
    environment:
      POSTGRES_USER: docqa
      POSTGRES_PASSWORD: docqa
      POSTGRES_DB: docqa
    ports:
      - "5432:5432"
    volumes:
      - docqa_pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  docqa_pgdata:
